services:
  db:
    image: mariadb:latest
    volumes:
      - db_data:/var/lib/mysql
      - ../sermaconsa/semaconsa-web/extracted_wp/database.sql:/docker-entrypoint-initdb.d/database.sql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"

  wordpress:
    depends_on:
      - db
    image: wordpress:latest
    ports:
      - "8000:80"
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
    volumes:
      # Mount the current directory as the active theme
      - .:/var/www/html/wp-content/themes/sermacosa-pro-v2
      # Mount plugins from extracted_wp
      - ../sermaconsa/semaconsa-web/extracted_wp/plugins:/var/www/html/wp-content/plugins
      # Mount uploads from extracted_wp
      - ../sermaconsa/semaconsa-web/extracted_wp/uploads:/var/www/html/wp-content/uploads
      # Mount languages if available
      - ../sermaconsa/semaconsa-web/extracted_wp/languages:/var/www/html/wp-content/languages

volumes:
  db_data:
